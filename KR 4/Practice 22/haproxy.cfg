global
    daemon
    maxconn 50000

defaults
    mode http
    timeout connect 5s
    timeout client 50s
    timeout server 50s

frontend http_front
    bind *:8080
    default_backend http_back

backend http_back
    balance roundrobin
    option httpchk
    server server1 host.docker.internal:3000 check
    server server2 host.docker.internal:3001 check
    server server3 host.docker.internal:3002 check backup

listen stats
    bind *:8081
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s

